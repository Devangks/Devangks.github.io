<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devang | Premium Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
}

/* container */
.container{
width:100%;
max-width:420px;
padding:25px;
text-align:center;
backdrop-filter:blur(20px);
border-radius:25px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* profile */
.profile-pic{
width:110px;height:110px;
border-radius:50%;
border:3px solid #22c55e;
margin-bottom:12px;
}

/* links */
.links{
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:14px 18px;
border-radius:14px;
background:rgba(255,255,255,0.05);
text-decoration:none;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
transition:.3s;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.arrow{transition:.3s}
.btn:hover .arrow{transform:translateX(6px)}

/* spotify box */
.spotify{
margin-top:15px;
}

/* visitor */
.visitor{
margin-top:15px;
opacity:0.7;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<img src="pfp.jpg" class="profile-pic">

<h1>Devang</h1>
<p>Gamer 🎮</p>

<div class="links">

<a href="https://instagram.com/devang_ks" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-instagram"></i> Instagram</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://youtube.com/@devang_ks" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-youtube"></i> YouTube</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://open.spotify.com/user/313yqn4t66lnfcz5sosdmd36ktly" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-spotify"></i> Spotify</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://tracker.gg/valorant/profile/riot/devang%23meow/overview" target="_blank" class="btn">
<div class="left"><i class="fa-solid fa-gamepad"></i> Riot</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://t.me/devang_ks" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-telegram"></i> Telegram</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://wa.me/15094282645?text=Hey%20Devang" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-whatsapp"></i> WhatsApp</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://www.snapchat.com/add/devang_ks" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-snapchat"></i> Snapchat</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

</div>

<!-- 🎧 Spotify live (simple embed) -->
<div class="spotify">
<iframe style="border-radius:12px" 
src="https://open.spotify.com/embed/user/313yqn4t66lnfcz5sosdmd36ktly" 
width="100%" height="80" frameBorder="0" allowfullscreen="" 
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<!-- 👀 Visitor counter -->
<div class="visitor">
Visitors 👀: <span id="count">Loading...</span>
</div>

</div>

<script>
// simple visitor counter (local)
let count = localStorage.getItem("visit_count") || 0;
count++;
localStorage.setItem("visit_count", count);
document.getElementById("count").innerText = count;
</script>

</body>
</html>
